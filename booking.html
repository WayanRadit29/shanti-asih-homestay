<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking - Shanti Asih Homestay</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-white shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Shanti Asih Homestay</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
          <li class="nav-item"><a class="nav-link" href="rooms.html">Kamar</a></li>
          <li class="nav-item"><a class="nav-link active" href="booking.html">Booking</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5 bg-light">
    <div class="container text-center">
      <h1 class="fw-bold">Form Booking</h1>
      <p class="text-muted">Isi data berikut untuk simulasi pemesanan kamar.</p>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8">

          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <form id="bookingForm">

                <div class="mb-3">
                  <label for="guestName" class="form-label">Nama Lengkap</label>
                  <input type="text" class="form-control" id="guestName" placeholder="Masukkan nama lengkap">
                </div>

                <div class="mb-3">
                  <label for="guestContact" class="form-label">Email / Nomor HP</label>
                  <input type="text" class="form-control" id="guestContact" placeholder="Masukkan email atau nomor HP">
                </div>

                <div class="mb-3">
                  <label for="roomType" class="form-label">Tipe Kamar</label>
                  <select class="form-select" id="roomType">
                    <option value="">Pilih tipe kamar</option>
                    <option value="Standard Room">Standard Room</option>
                  </select>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="checkIn" class="form-label">Tanggal Check-in</label>
                    <input type="date" class="form-control" id="checkIn">
                  </div>

                  <div class="col-md-6 mb-3">
                    <label for="checkOut" class="form-label">Tanggal Check-out</label>
                    <input type="date" class="form-control" id="checkOut">
                  </div>
                </div>

                <div class="mb-3">
                  <label for="guestCount" class="form-label">Jumlah Tamu</label>
                  <input type="number" class="form-control" id="guestCount" min="1" max="4" placeholder="Contoh: 2">
                </div>

                <div class="mb-4">
                  <label for="message" class="form-label">Catatan Tambahan</label>
                  <textarea class="form-control" id="message" rows="3" placeholder="Contoh: ingin kamar dekat kolam renang"></textarea>
                </div>

                <button type="submit" class="btn btn-dark btn-lg w-100">Kirim Booking</button>

              </form>
            </div>
          </div>

          <div id="bookingResult" class="alert alert-success mt-4 d-none"></div>

        </div>
      </div>
    </div>
  </section>

  <footer class="py-4 bg-dark text-white text-center">
    <p class="mb-0">&copy; 2026 Shanti Asih Homestay. All Rights Reserved.</p>
  </footer>

  <script src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
